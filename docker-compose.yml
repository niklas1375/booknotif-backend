version: '3.8'

services:
  booknotif-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booknotif-backend
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/booknotif.db
    restart: unless-stopped